name: Build download ZIPs

on:
  push:
    branches: ["main"]
    paths:
      - "reports/**"
      - "presentations/**"
      - "Case Studies.html"
      - "tools/build_downloads.py"
      - ".github/workflows/build-download-zips.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build ZIPs
        run: python "tools/build_downloads.py"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add downloads/*.zip
            git commit -m "Auto-build downloads zips"
            git push
          else
            echo "No changes to commit."
          fi

